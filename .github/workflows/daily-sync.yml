name: Daily Sync

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC = 06:00 CEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        working-directory: sync
        run: pip install -e .

      - name: Run sync
        working-directory: sync
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          SHEETS_ID: ${{ secrets.SHEETS_ID }}
        run: python sync.py

      - name: Mirror snapshot into web/public for Vercel build
        run: cp data/snapshot.json web/public/snapshot.json

      - name: Commit snapshot if changed
        run: |
          git config user.name "pulse-sync"
          git config user.email "pulse-sync@users.noreply.github.com"
          git add data/snapshot.json web/public/snapshot.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(data): sync $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data '{"text":":rotating_light: AlpineGear Pulse sync failed: ${{ github.run_id }}"}' \
            "$SLACK_WEBHOOK_URL"
